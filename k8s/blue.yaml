apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: engine
      version: blue
  template:
    metadata:
      labels:
        app: engine
        version: blue
    spec:
      containers:
      - name: engine
        image: trading-engine:latest
        imagePullPolicy: Never
